<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【今晚吃什麼】學長姐的求生輪盤</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background: transparent; /* 透明背景，完美融入 Tally */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 轉盤外殼區 */
        .wheel-section {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 灰褐色指標 */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #7D7571;
            z-index: 10;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2));
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #FFFDF4; /* 奶油外圈 */
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        
        /* 圓心鈕 */
        #spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #9A928D;
            color: #fff;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0px -3px 0px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.2);
            z-index: 5;
            letter-spacing: 1px;
        }
        #spin-btn:disabled { background: #bbb; cursor: not-allowed; }

        /* 彈出結果視窗 */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            width: 85%;
            max-width: 310px;
            border: 1px solid #FAF9F6;
        }
        
        .modal .category-title { 
            margin: 0 0 12px 0; 
            color: #7D7571; 
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px dashed #E0DCD3;
            padding-bottom: 8px;
        }
        
        .modal .shop-label {
            font-size: 0.85rem;
            color: #888;
            margin: 5px 0 4px 0;
        }

        .modal .shop-name { 
            color: #E89E84; 
            font-size: 1.35rem; 
            margin: 0 0 12px 0;
            font-weight: bold;
        }
        
        /* ✨ 精準星等容器樣式（比照 Google Maps 視覺） */
        .star-rating-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin: 5px 0;
        }

        .google-stars {
            position: relative;
            display: inline-block;
            font-size: 1.4rem;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* 底層星星（暗灰色） */
        .google-stars-background {
            color: #7F8C8D; /* 參考您第一張圖的暗灰底色 */
            opacity: 0.5;
        }

        /* 上層星星（填色金黃色） */
        .google-stars-foreground {
            color: #FFCD00; /* 參考您第一張圖的明亮金黃色 */
            position: absolute;
            top: 0;
            left: 0;
            width: 0%; /* 由 JavaScript 動態控制填滿比例 */
            overflow: hidden;
            white-space: nowrap;
        }

        .rating-num {
            font-size: 1rem;
            color: #666;
            margin-left: 6px;
            font-weight: normal;
        }
        
        .modal button {
            background: #6A8FAF; color: white; border: none;
            padding: 10px 28px; border-radius: 6px; cursor: pointer; margin-top: 18px;
            font-weight: bold; font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(106, 143, 175, 0.3);
        }
    </style>
</head>
<body>

    <div class="wheel-section">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
        <button id="spin-btn">GO</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="category-title" id="modal-category"></div>
        <div class="shop-label">✨ 學長姐極推店家 ✨</div>
        <div class="shop-name" id="modal-shop"></div>
        <div class="shop-label">好吃等級 (Google 評價)</div>
        
        <div class="star-rating-wrapper">
            <div class="google-stars">
                <div class="google-stars-background">★★★★★</div>
                <div class="google-stars-foreground" id="modal-stars-front">★★★★★</div>
            </div>
            <span class="rating-num" id="modal-rating-text"></span>
        </div>

        <div><button onclick="closeModal()">太棒了！</button></div>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人後台資料庫：隨時可以在下方自由修改、增刪店家與分數
        // ===================================================================
        const wheelData = [
            {
                category: " 宵夜街神級炸雞",
                shops: [
                    { name: "開源社香雞排 (清大店)", rating: 4.2 },
                    { name: "滋滋炸雞翅", rating: 4.5 },
                    { name: "阿亮香雞排", rating: 4.3 }
                ]
            },
            {
                category: " 東門市場文青料理",
                shops: [
                    { name: "硬派主廚的軟嫩料理", rating: 4.7 },
                    { name: "大成1978古早味", rating: 4.6 },
                    { name: "青丘。Qingqiu", rating: 4.8 },
                    { name: "曼谷市場 (東門店)", rating: 4.4 }
                ]
            },
            {
                category: " 城隍廟百年肉圓",
                shops: [
                    { name: "柳家肉燥飯", rating: 4.3 },
                    { name: "阿城號米粉", rating: 4.2 },
                    { name: "王記肉圓", rating: 4.2 },
                    { name: "西大發爆漿包子", rating: 4.3 }
                ]
            },
            {
                category: " 研究生續命咖啡",
                shops: [
                    { name: "墨咖啡 Ink Coffee", rating: 4.6 },
                    { name: "暗室微光 In the Shadow of Gleam", rating: 4.5 },
                    { name: "江山藝改所", rating: 4.6 },
                    { name: "一想一響 ReEcho Coffee", rating: 4.5 }
                ]
            },
            {
                category: " 懷舊麵線攤",
                shops: [
                    { name: "清茂素食麵線", rating: 4.7 },
                    { name: "紅麵線 (建功路)", rating: 4.3 },
                    { name: "享來初", rating: 4.3 }
                ]
            },
            {
                category: " 大吃市人氣滷肉飯",
                shops: [
                    { name: "金連滷肉飯", rating: 4.2 },
                    { name: "翁記滷肉飯 (牛埔店)", rating: 4.3 },
                    { name: "禾日香魯肉飯", rating: 4.4 }
                ]
            },
            {
                category: " 經典排骨飯",
                shops: [
                    { name: "北門來呷・燒米研製所", rating: 4.3 },
                    { name: "風雲餐廳二樓排骨", rating: 4.2 },
                    { name: "正宗排骨飯 (建功)", rating: 4.2 }
                ]
            },
            {
                category: " 經國路深夜串燒",
                shops: [
                    { name: "私嚐串燒居酒屋", rating: 4.7 },
                    { name: "大黑天串燒居酒屋", rating: 4.6 },
                    { name: "燃手串 (新竹店)", rating: 4.4 }
                ]
            },
            {
                category: " 校門口隱藏版綠洲",
                shops: [
                    { name: "磨豆", rating: 4.4 },
                    { name: "小木屋鬆餅 (清大店)", rating: 4.4 },
                    { name: "海鷗大腸包小腸", rating: 4.5 }
                ]
            },
            {
                category: " 工程師愛店肉羹",
                shops: [
                    { name: "飛龍肉圓生炒鴨肉羹", rating: 4.3 },
                    { name: "公園黑乾麵", rating: 4.2 },
                    { name: "林娘炸醬麵", rating: 4.4 }
                ]
            }
        ];

        const options = wheelData.map(item => item.category);

        // 🎨 莫蘭迪粉藍交錯色盤
        const colorPalette = [
            "#FBC0A8", "#6A8FAF", "#FCD3C1", "#82A5C3", "#E89E84", 
            "#557796", "#FDE3D6", "#9BBED4", "#D6866B", "#435D75"
        ];

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spin-btn");
        const modal = document.getElementById("resultModal");
        
        const mCategory = document.getElementById("modal-category");
        const mShop = document.getElementById("modal-shop");
        const mStarsFront = document.getElementById("modal-stars-front");
        const mRatingText = document.getElementById("modal-rating-text");

        function drawWheel() {
            const numSegments = options.length;
            const segmentAngle = (2 * Math.PI) / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const radius = canvas.width / 2;
            
            ctx.textBaseline = "middle";
            ctx.textAlign = "right";
            ctx.font = "bold 18px sans-serif";

            for (let i = 0; i < numSegments; i++) {
                const angle = i * segmentAngle;
                
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + segmentAngle);
                ctx.fillStyle = colorPalette[i % colorPalette.length];
                ctx.fill();

                ctx.strokeStyle = "rgba(255,255,255,0.6)";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + segmentAngle / 2);
                
                ctx.fillStyle = (i % colorPalette.length === 9) ? "#ffffff" : "#3D3735"; 
                ctx.fillText(options[i], radius - 35, 0);
                ctx.restore();
            }
        }

        let isSpinning = false;
        spinBtn.addEventListener("click", () => {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            spinBtn.disabled = true;

            const numSegments = options.length;
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalRotation = (8 + Math.floor(Math.random() * 5)) * 360 + extraDegrees;
            
            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;

                const actualDegrees = totalRotation % 360;
                const pointerAngle = (360 - actualDegrees + 270) % 360;
                const winningIndex = Math.floor(pointerAngle / (360 / numSegments)) % numSegments;

                const targetCategoryData = wheelData[winningIndex];
                const shopList = targetCategoryData.shops;
                const randomShop = shopList[Math.floor(Math.random() * shopList.length)];

                // 寫入資料
                mCategory.innerText = targetCategoryData.category;
                mShop.innerText = randomShop.name;
                mRatingText.innerText = `(${randomShop.rating.toFixed(1)})`;
                
                // 🌟 用百分比精準控制黃色星星的裁剪寬度（1顆星佔20%寬度）
                const fillPercentage = (randomShop.rating / 5) * 100;
                mStarsFront.style.width = `${fillPercentage}%`;
                
                modal.style.display = "block";
                
                canvas.style.transition = "none";
                canvas.style.transform = `rotate(${actualDegrees}deg)`;
                canvas.offsetHeight; 
                canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.3, 1)";
            }, 4000);
        });

        function closeModal() { modal.style.display = "none"; }

        drawWheel();
    </script>
</body>
</html>
