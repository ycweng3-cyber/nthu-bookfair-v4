<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【今晚吃什麼】學長姐的求生輪盤</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background: transparent; /* 透明背景，完美融入 Tally */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 轉盤外殼區 */
        .wheel-section {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 灰褐色指標 */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #7D7571;
            z-index: 10;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2));
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #FFFDF4; /* 奶油外圈 */
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        
        /* 圓心鈕 */
        #spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #9A928D;
            color: #fff;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0px -3px 0px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.2);
            z-index: 5;
            letter-spacing: 1px;
        }
        #spin-btn:disabled { background: #bbb; cursor: not-allowed; }

        /* 彈出結果視窗 */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            width: 85%;
            max-width: 280px;
        }
        .modal h3 { margin-top: 0; color: #E89E84; font-size: 1.3rem; }
        .modal button {
            background: #6A8FAF; color: white; border: none;
            padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="wheel-section">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
        <button id="spin-btn">GO</button>
    </div>

        <button onclick="closeModal()">太棒了！</button>
